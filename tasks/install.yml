- name: Paivitetaan paketit ja asennetaan Apache, PHP ja MariaDB
  apt:
    name:
      - apache2
      - mariadb-server
      - php
      - libapache2-mod-php
      - php-mysql
    state: latest
    update_cache: yes
  notify: "Restart Apache"

- name: Varmistetaan etta MariaDB on Kaynnissa
  service:
    name: mariadb
    state: started
    enabled: yes
  notify: "Restart MariaDB"

- name: Luodaan tyylitelty etusivu
  copy:
    dest: /var/www/html/index.html
    content: |
      <body style="font-family:sans-serif;text-align:center;background:#f0f0f0;padding-top:50px;">
        <h1 style="color:#2c3e50;">Ansible-automaatio valmis!</h1>
        <div style="background:white;padding:20px;display:inline-block;border-radius:10px;box-shadow:0 4px 6px rgba(0,0,0,0.1);">
          <strong>Status:</strong> Jarjestelma pystytetty onnistuneesti<br>
          <strong>Tekijat:</strong> Ville & Sami
        </div>
      </body>
    mode: '0644'
